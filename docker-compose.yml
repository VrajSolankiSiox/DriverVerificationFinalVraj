version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: hotel-demo-intelligence-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hotel_demo
      POSTGRES_PASSWORD: hotel_demo
      POSTGRES_DB: hotel_demo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
